<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IONe</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="layout">
    <nav id="sidebar" aria-label="Conversations">

      <!-- Workspace switcher -->
      <div id="workspace-switcher">
        <button id="workspace-trigger" aria-haspopup="true" aria-expanded="false" aria-label="Switch workspace">
          <span id="workspace-name">Loading…</span>
          <span id="workspace-domain" class="workspace-domain"></span>
          <span class="workspace-caret" aria-hidden="true">▾</span>
        </button>
        <ul id="workspace-menu" role="menu" aria-label="Workspaces" hidden></ul>
      </div>

      <button id="new-workspace-btn" aria-label="Create new workspace">+ New workspace</button>
      <button id="new-chat-btn" aria-label="New chat">+ New chat</button>
      <p id="workspace-closed-notice" hidden>This workspace is closed.</p>
      <ul id="conv-list" role="list"></ul>
    </nav>
    <div id="main">
      <!-- Tab row -->
      <div id="tab-bar" role="tablist" aria-label="Main view">
        <button id="tab-chat" role="tab" aria-selected="true" aria-controls="panel-chat" class="tab tab--active">Chat</button>
        <button id="tab-connectors" role="tab" aria-selected="false" aria-controls="panel-connectors" class="tab">Connectors</button>
      </div>

      <!-- Chat panel -->
      <div id="panel-chat" role="tabpanel" aria-labelledby="tab-chat">
        <div id="transcript" aria-live="polite"></div>
        <form id="chat-form">
          <textarea id="prompt" rows="3" placeholder="Type a message…" required></textarea>
          <button type="submit" id="send-btn">Send</button>
        </form>
        <p id="status"></p>
      </div>

      <!-- Connectors panel -->
      <div id="panel-connectors" role="tabpanel" aria-labelledby="tab-connectors" hidden>
        <div id="connectors-header">
          <button id="add-connector-btn" type="button">+ Add connector</button>
        </div>
        <div id="connectors-status" aria-live="polite"></div>
        <ul id="connector-list" role="list"></ul>
      </div>
    </div>
  </div>

  <!-- New workspace modal -->
  <dialog id="new-workspace-dialog" aria-labelledby="nw-dialog-title">
    <form id="new-workspace-form" method="dialog">
      <h2 id="nw-dialog-title">New Workspace</h2>
      <label for="nw-name">Name <span aria-hidden="true">*</span></label>
      <input id="nw-name" type="text" required placeholder="My workspace" autocomplete="off" />

      <label for="nw-domain">Domain</label>
      <input id="nw-domain" type="text" placeholder="generic" autocomplete="off" />

      <label for="nw-lifecycle">Lifecycle</label>
      <select id="nw-lifecycle">
        <option value="continuous">continuous</option>
        <option value="bounded">bounded</option>
      </select>

      <p id="nw-error" class="nw-error" hidden></p>

      <div class="nw-actions">
        <button type="button" id="nw-cancel-btn">Cancel</button>
        <button type="submit" id="nw-submit-btn">Create</button>
      </div>
    </form>
  </dialog>

  <!-- Add connector dialog -->
  <dialog id="add-connector-dialog" aria-labelledby="ac-dialog-title">
    <form id="add-connector-form" method="dialog">
      <h2 id="ac-dialog-title">Add Connector</h2>

      <label for="ac-kind">Kind <span aria-hidden="true">*</span></label>
      <select id="ac-kind" required>
        <option value="rust_native">rust_native</option>
        <option value="openapi">openapi</option>
        <option value="mcp">mcp</option>
      </select>

      <label for="ac-name">Name <span aria-hidden="true">*</span></label>
      <input id="ac-name" type="text" required placeholder="My connector" autocomplete="off" />

      <label for="ac-config">Config (JSON)</label>
      <textarea id="ac-config" rows="4" placeholder='{"lat": 46.87, "lon": -113.99}'></textarea>

      <p id="ac-error" class="ac-error" hidden></p>

      <div class="ac-actions">
        <button type="button" id="ac-cancel-btn">Cancel</button>
        <button type="submit" id="ac-submit-btn">Create</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
